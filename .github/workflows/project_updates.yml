name: Project Updates
on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync_and_notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Sync and Alert
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOMATION_TOKEN }}
          script: |
            const query = `query($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                issues(states:OPEN, first:50, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    number
                    title
                    labels(first:5) { nodes { name } }
                    projectItems(first:3) {
                      nodes {
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2FieldCommon { name } }
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;
            
            const res = await github.graphql(query, { owner: context.repo.owner, repo: context.repo.repo });

            for (const issue of res.repository.issues.nodes) {
              for (const item of issue.projectItems.nodes) {
                const fields = item.fieldValues.nodes.filter(f => f.field);
                const statusField = fields.find(f => f.field.name.toLowerCase() === 'status');

                if (statusField) {
                  const status = statusField.name;
                  const targetLabel = `status: ${status.toLowerCase()}`;
                  const currentLabels = issue.labels.nodes.map(l => l.name);

                  if (!currentLabels.includes(targetLabel)) {
                    // Remove existing status labels
                    const labelsToRemove = currentLabels.filter(l => l.startsWith('status: '));
                    for (const l of labelsToRemove) {
                      await github.rest.issues.removeLabel({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        name: l
                      }).catch(() => {});
                    }

                    // Apply new label
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: [targetLabel]
                    });

                    // Signal Discord
                    await fetch("${{ secrets.DISCORD_PROJECT_WEBHOOK }}", {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ 
                        content: `Project Update: **${issue.title}** is now **${status}**` 
                      })
                    });
                  }
                }
              }
            }